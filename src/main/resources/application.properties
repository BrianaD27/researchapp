# PostgreSQL Configuration (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/vsu_research_app
spring.datasource.username=vsu_user
spring.datasource.password=vsu_password
spring.datasource.driver-class-name=org.postgresql.Driver

# SQL init (optional)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=false

# H2 Console (only useful if you actually use H2; safe to leave, but typically dev-only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.vsu.researchapp=DEBUG

# Server
server.port=8080
spring.application.name=ResearchApp
spring.main.allow-bean-definition-overriding=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS allowed origins (for your frontend)
app.cors.allowed-origins=http://localhost:3000
