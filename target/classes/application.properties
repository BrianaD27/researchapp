# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:vsu_research_app}
spring.datasource.username=${DB_USERNAME:vsu_user}
spring.datasource.password=${DB_PASSWORD:vsu_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=false

# H2 Console - DEV ONLY
spring.h2.console.enabled=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.vsu.researchapp=DEBUG

# Server
server.port=8080
spring.application.name=ResearchApp
spring.main.allow-bean-definition-overriding=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=${JWT_SECRET:vsu-research-app-super-secret-key-change-this-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Security Response Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict